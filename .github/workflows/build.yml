---
# yamllint .github/workflows/build.yml
# Notes:
# - Tests can be added as a step under build job (not a separate job)
name: Build and Test Pipeline

# 1. Trigger
on:
  push:
    branches:
      - main
# Does not work here
#runs:
#  using: 'node24'
# 2. Jobs (being triggered)
jobs:
  build_job:
    runs-on: ubuntu-latest
    env:
      #FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      #ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
      GREETING: Hello
    # By defaul runs in a VM. Optional container ...
    # container:
    #  image: procster-build-image:latest
    #  # In case stored in external registry
    #  # (even ghcr.io/myorg/myrepo/myimg:latest):
    #   credentials:
    #     username: ${{ github.actor }}
    #     password: ${{ secrets.GITHUB_TOKEN }}
    #  # In case special privileges are needed
    #  #options: --privileged
    steps:
      # GitHub requires you to explicitly check out your repository code
      - name: Checkout/Clone Code
        uses: actions/checkout@v4
      # Special Dependencies (VM)???
      # For docker build, this dep-addition goes to Dockerfile
      #- name: Install (VM) Dependencies
      #  run: |
      #    sudo apt-get update
      #    sudo apt-get install -y make libproc2
      # Optional: Build docker image on-the-fly
      #- name: Build Docker image
      #  run: |
      #   docker build -t procster:latest . -f docker/Dockerfile
      - name: Install (extra) dependencies
        run: |
          sudo apt update
          sudo apt-get install -y libproc2-dev libjansson4 libjansson-dev
          sudo apt-get install -y libglib2.0-0t64 libglib2.0-dev
          sudo apt-get install -y libmicrohttpd12t64 libmicrohttpd-dev
      # Alternative section
      - name: Run Build
        env:
          #FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
          ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
        # May consist of one or multiple (run: |\n) lines
        # Also: make libs2 && make main2
        run: |
          echo "Build the code..."
          make libs2
          make main2
          make objclean
      - name: Run Tests
        run: |
          echo "Running unit tests..."
          sudo chmod a+x ./proc2server
          ./proc2server 8001 --daemon
          sleep 5
          make test
      - name: Install Debian packaging utilities
        run: package_deps
      - name: Package the App as .deb
        run: make package
      # Note: We could test here immediately and prevent the need to store
      # artifacts. These are (in practice) mutually exclusive
      #- name: Run tests
      #  run: ./run_tests.sh
      #- name: Store Artifacts
      #  uses: actions/upload-artifact@v4
      #  with:
      #    name: pr-assets
      #    path: |
      #      procserver
      #      procserver2
      #      proc2server
      #      proctest
      #      procutil
      #      procutil2
  # test_job:
  #   # 3. Dependencies !! (test runs after 'build_job')
  #   # Note should refer to earlier artifacts stored by name
  #   needs: build_job
  #   runs-on: ubuntu-latest
  #   steps:
  #     - name: Download Temporary Build Artifacts (pr-assets)
  #       uses: actions/download-artifact@v4
  #       with:
  #         name: pr-assets
  #     # Note - this implies fresh checkout (no build products !)
  #     #- name: Checkout Code
  #     #  uses: actions/checkout@v4
  #     # Note: Port must be in sync with make test target !!!
  #     - name: Run Tests
  #       run: |
  #         echo "Running unit tests..."
  #         sudo chmod a+x ./proc2server
  #         ./proc2server 8001 &
  #         make test
  release_job:
    if: github.ref == 'b'
    # Only run this if the tests pass
    #needs: test_job
    runs-on: ubuntu-latest
    steps:
      - name: Download Temporary Artifacts
        uses: actions/download-artifact@v4
        with:
          name: pr-assets

      - name: Publish to Permanent GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0
          files: |
            procserver
            procserver2
