---
# yamllint .github/workflows/build.yml
# Notes:
# - Tests can be added as a step under build job (not a separate job)
# - Access tokens: Profile pic => Settings => Developer Settings (near the bottom) => Personal access tokens
# - secrets.GITHUB_TOKEN is dynamic, temporary, automatic, per repo (associated, runner of actions: github.actor)
# - Local terminal push/pull requires  Personal Access Token (classic) w. write:packages and read:packages scopes
# - Currently, Fine-grained tokens do not support GitHub Packages (GHCR)
# Refs:
# - https://docs.github.com/en/actions/using-workflows
# - https://xebia.com/blog/a-ready-to-use-github-action-workflow-for-pushing-container-images-to-the-registry/
name: Build and Test Pipeline

# 1. Trigger
on:
  push:
    branches:
      - main
# Does not work here
# runs:
#  using: 'node24'
# For ghcr.io push, etc. Note: this same construct could be on job level as well.
permissions:
  contents: read
  packages: write
# 2. Jobs (being triggered)
jobs:
  build_job:
    name: Build procster and package it as DEB
    runs-on: ubuntu-latest
    env:
      #FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      #ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
      GREETING: Hello
    # By default build runs in a VM. Optional container ...
    # container:
    #  image: procster-build-image:latest
    #  # In case stored in external registry. ghcr.io creds here come from env. or repo secrets (in that order)
    #  # Create them at: Settings => Secrets and variables => (Tab) Secrets => Repository secrets => New repository secret.
    #  # Note: e.g. github-pages is an environment.
    #  # (even ghcr.io/myorg/myrepo/myimg:latest needs credentials and secrets to access it, but below are automatic):
    #   credentials:
    #     username: ${{ github.actor }}
    #     password: ${{ secrets.GITHUB_TOKEN }}
    #  # In case special privileges are needed
    #  #options: --privileged
    steps:
      # GitHub requires you to explicitly check out your repository code
      - name: Checkout/Clone Code
        uses: actions/checkout@v4
      # Special Dependencies (VM)???
      # For docker build, this dep-addition goes to Dockerfile
      # - name: Install (VM) Dependencies
      #  run: |
      #    sudo apt-get update
      #    sudo apt-get install -y make libproc2
      # Optional: Build docker image on-the-fly
      #- name: Build Docker image
      #  run: |
      #   docker build -t procster:latest . -f docker/Dockerfile
      - name: Install (extra) dependencies
        run: |
          sudo apt update
          sudo apt install -y libproc2-dev libjansson4 libjansson-dev libglib2.0-0t64 libglib2.0-dev libmicrohttpd12t64 libmicrohttpd-dev
      # Alternative section
      - name: Run Build
        env:
          #FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
          ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
        # May consist of one or multiple (run: |\n) lines
        # Also: make libs2 && make main2
        run: |
          make all2
          make objclean
      - name: Run Smoke Tests
        run: |
          sudo chmod a+x ./proc2server
          ./proc2server 8001 --daemon
          sleep 2
          make test
      - name: Install Debian packaging utilities
        run: make package_deps
      - name: Package the App as .deb
        run: make package
      # Note: We could test here immediately and prevent the need to store
      # artifacts. These are (in practice) mutually exclusive
      #- name: Run tests
      #  run: ./run_tests.sh
      #- name: Store Artifacts
      #  uses: actions/upload-artifact@v4
      #  with:
      #    name: pr-assets
      #    path: |
      #      procserver
      #      procserver2
      #      proc2server
      #      proctest
      #      procutil
      #      procutil2
  # Build procster app image (NOT build image) and push to GH container registry
  # This depends on top-level perms: contents: read, packages: write
  image_job:
    name: Build docker image
    # if: github.ref == 'b'
    runs-on: ubuntu-latest
    steps:
      # v3 vs v4 ???
      - name: Checkout/Clone Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      #- name: Get Tag
      #  id: repository
      #  run: echo "tag=$(git describe --tags HEAD)" > $GITHUB_ENV
      - name: Set up Docker Buildx (v2)
        uses: docker/setup-buildx-action@v2
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      #- name: Next Step
      #  run: echo "Hello"
      # Note the idiom to identify image. TODO: explicit version from ... (?)
      # Example: tags: ghcr.io/${{ github.repository }}:${{ env.tag }}  See above: ... > $GITHUB_ENV
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile
          # linux/amd64,linux/arm64
          platforms: linux/amd64
          push: true
          tags: ghcr.io/${{ github.repository }}:latest
          # Pass variables to Dockerfile ARG directives (e.g. version)
          # build-args: |
          #  VERSION=1.0.0
          #  ENVIRONMENT=production
  # test_job:
  #   # 3. Dependencies !! (test runs after 'build_job')
  #   # Note should refer to earlier artifacts stored by name
  #   needs: build_job
  #   runs-on: ubuntu-latest
  #   steps:
  #     - name: Download Temporary Build Artifacts (pr-assets)
  #       uses: actions/download-artifact@v4
  #       with:
  #         name: pr-assets
  #     # Note - this implies fresh checkout (no build products !)
  #     #- name: Checkout Code
  #     #  uses: actions/checkout@v4
  #     # Note: Port must be in sync with make test target !!!
  #     - name: Run Tests
  #       run: |
  #         echo "Running unit tests..."
  #         sudo chmod a+x ./proc2server
  #         ./proc2server 8001 &
  #         make test
  release_job:
    if: github.ref == 'b'
    # Only run this if the tests pass
    #needs: test_job
    runs-on: ubuntu-latest
    steps:
      - name: Download Temporary Artifacts
        uses: actions/download-artifact@v4
        with:
          name: pr-assets

      - name: Publish to Permanent GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0
          files: |
            procserver
            procserver2
